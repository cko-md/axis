<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="envoy-meridian-title">
  <title id="envoy-meridian-title">Meridian, a hooded wayfarer holding a small glowing lantern</title>
  <defs>
    <radialGradient id="meridian-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1b2030"/>
      <stop offset="100%" stop-color="#0c0e13"/>
    </radialGradient>
    <radialGradient id="meridian-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0c388" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0c388" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#meridian-bg)"/>
  <!-- cloak -->
  <path d="M120 52 C88 62 74 96 72 138 C70 176 84 198 120 198 C156 198 170 176 168 138 C166 96 152 62 120 52 Z" fill="#232a3d" stroke="#3a445e" stroke-width="2"/>
  <!-- hood opening + face -->
  <ellipse cx="120" cy="96" rx="30" ry="32" fill="#12141c"/>
  <circle cx="120" cy="98" r="24" fill="#e8dfc9"/>
  <circle cx="111" cy="96" r="3.2" fill="#1a1c22"/>
  <circle cx="129" cy="96" r="3.2" fill="#1a1c22"/>
  <path d="M112 108 Q120 113 128 108" fill="none" stroke="#1a1c22" stroke-width="2" stroke-linecap="round"/>
  <!-- arms -->
  <path d="M86 128 C80 142 82 156 92 164" fill="none" stroke="#3a445e" stroke-width="10" stroke-linecap="round"/>
  <path d="M154 128 C162 140 162 152 152 162" fill="none" stroke="#3a445e" stroke-width="10" stroke-linecap="round"/>
  <!-- lantern -->
  <circle cx="94" cy="172" r="22" fill="url(#meridian-glow)"/>
  <rect x="86" y="162" width="16" height="20" rx="4" fill="#12141c" stroke="#e0c388" stroke-width="2"/>
  <circle cx="94" cy="172" r="4" fill="#e0c388"/>
  <!-- compass line motif on cloak -->
  <path d="M120 132 v40 M104 152 h32" stroke="#7fb0ff" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
</svg>
