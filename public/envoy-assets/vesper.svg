<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="envoy-vesper-title">
  <title id="envoy-vesper-title">Vesper, a gentle moth-winged signal keeper with a soft glow</title>
  <defs>
    <radialGradient id="vesper-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1b2030"/>
      <stop offset="100%" stop-color="#0c0e13"/>
    </radialGradient>
    <radialGradient id="vesper-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fb0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fb0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#vesper-bg)"/>
  <circle cx="120" cy="120" r="86" fill="url(#vesper-glow)"/>
  <!-- wings -->
  <path d="M112 120 C74 84 52 92 56 124 C59 148 84 160 110 152 Z" fill="#2b3350" stroke="#46538a" stroke-width="2"/>
  <path d="M128 120 C166 84 188 92 184 124 C181 148 156 160 130 152 Z" fill="#2b3350" stroke="#46538a" stroke-width="2"/>
  <path d="M70 116 C76 112 84 112 90 116" fill="none" stroke="#7fb0ff" stroke-width="2" opacity="0.7"/>
  <path d="M150 116 C156 112 164 112 170 116" fill="none" stroke="#7fb0ff" stroke-width="2" opacity="0.7"/>
  <!-- body -->
  <ellipse cx="120" cy="140" rx="17" ry="34" fill="#232a3d" stroke="#3a445e" stroke-width="2"/>
  <!-- head -->
  <circle cx="120" cy="96" r="21" fill="#e8dfc9"/>
  <circle cx="112" cy="94" r="3" fill="#1a1c22"/>
  <circle cx="128" cy="94" r="3" fill="#1a1c22"/>
  <path d="M113 105 Q120 109 127 105" fill="none" stroke="#1a1c22" stroke-width="2" stroke-linecap="round"/>
  <!-- antennae with soft tips -->
  <path d="M112 78 C108 68 100 62 92 62" fill="none" stroke="#c9bda0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M128 78 C132 68 140 62 148 62" fill="none" stroke="#c9bda0" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="92" cy="62" r="4" fill="#e0c388"/>
  <circle cx="148" cy="62" r="4" fill="#e0c388"/>
  <!-- lantern belly light -->
  <circle cx="120" cy="150" r="7" fill="#e0c388"/>
</svg>
