<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="envoy-solace-title">
  <title id="envoy-solace-title">Solace, a round harbor keeper in an oilskin coat holding a warm light</title>
  <defs>
    <radialGradient id="solace-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1b2030"/>
      <stop offset="100%" stop-color="#0c0e13"/>
    </radialGradient>
    <radialGradient id="solace-beam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0c388" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e0c388" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#solace-bg)"/>
  <!-- gentle water line -->
  <path d="M28 206 Q60 200 92 206 T156 206 T220 206" fill="none" stroke="#46538a" stroke-width="2.5" opacity="0.7"/>
  <!-- round coat body -->
  <path d="M120 66 C86 66 68 96 68 132 C68 172 90 192 120 192 C150 192 172 172 172 132 C172 96 154 66 120 66 Z" fill="#3d3427" stroke="#5c4f38" stroke-width="2"/>
  <!-- coat buttons -->
  <circle cx="120" cy="128" r="3" fill="#e0c388"/>
  <circle cx="120" cy="146" r="3" fill="#e0c388"/>
  <circle cx="120" cy="164" r="3" fill="#e0c388"/>
  <!-- sou'wester brim + crown -->
  <ellipse cx="120" cy="74" rx="40" ry="10" fill="#5c4f38"/>
  <path d="M92 72 C94 54 106 44 120 44 C134 44 146 54 148 72 Z" fill="#6e5f43"/>
  <!-- face -->
  <circle cx="120" cy="92" r="20" fill="#e8dfc9"/>
  <circle cx="112" cy="90" r="3" fill="#1a1c22"/>
  <circle cx="128" cy="90" r="3" fill="#1a1c22"/>
  <path d="M112 101 Q120 106 128 101" fill="none" stroke="#1a1c22" stroke-width="2" stroke-linecap="round"/>
  <!-- arms; one holds the warm light -->
  <path d="M84 130 C76 142 76 154 84 162" fill="none" stroke="#5c4f38" stroke-width="10" stroke-linecap="round"/>
  <path d="M156 130 C166 140 168 152 160 162" fill="none" stroke="#5c4f38" stroke-width="10" stroke-linecap="round"/>
  <circle cx="162" cy="168" r="20" fill="url(#solace-beam)"/>
  <circle cx="162" cy="168" r="6" fill="#e0c388"/>
</svg>
