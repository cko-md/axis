<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>VECTOR Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090b10;
        color: #ece8df;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      main {
        width: min(600px, 100%);
        border: 1px solid #454033;
        background: #11141b;
        box-shadow: inset 0 1px rgba(255,255,255,.04);
        padding: 28px;
      }
      p, a { line-height: 1.6; }
      small { color: #a9a49a; letter-spacing: .08em; text-transform: uppercase; }
      h1 { margin: 10px 0 8px; font-size: clamp(28px, 8vw, 54px); letter-spacing: .08em; }
      h2 { margin-top: 28px; font-size: 16px; letter-spacing: .08em; text-transform: uppercase; }
      a { color: #e0c388; }
      ul { margin: 12px 0 24px; padding: 0; list-style: none; }
      li + li { margin-top: 8px; }
      .game {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border: 1px solid #38352d;
        padding: 12px 14px;
        text-decoration: none;
      }
      .version { color: #a9a49a; font-size: 13px; }
      #status[data-error="true"] { color: #e7a69e; }
      @media (prefers-color-scheme: light) {
        :root { color-scheme: light; background: #eee9df; color: #25231f; }
        main { background: #f7f3eb; border-color: #aaa18d; }
        small, .version { color: #686157; }
        a { color: #73591f; }
        .game { border-color: #c8c0b0; }
        #status[data-error="true"] { color: #8b332b; }
      }
    </style>
  </head>
  <body>
    <main>
      <small>VECTOR · Local fallback</small>
      <h1>Connection unavailable</h1>
      <p>
        The network route could not be reached. Verified games that remain
        installed on this device can still open below. Nothing is reported as synchronized.
      </p>

      <section aria-labelledby="installed-heading">
        <h2 id="installed-heading">Installed games</h2>
        <p id="status" role="status" aria-live="polite">Checking this device…</p>
        <ul id="games" hidden></ul>
      </section>

      <p><a href="/vector">Try the network route again</a></p>
    </main>
    <script>
      (() => {
        const status = document.getElementById("status");
        const games = document.getElementById("games");

        function workerRequest(worker, message) {
          return new Promise((resolve, reject) => {
            const channel = new MessageChannel();
            const timer = setTimeout(() => {
              channel.port1.close();
              reject(new Error("The offline worker did not respond."));
            }, 5000);
            channel.port1.onmessage = (event) => {
              clearTimeout(timer);
              channel.port1.close();
              const payload = event.data;
              if (payload && payload.ok === true) {
                resolve(payload.result);
                return;
              }
              reject(new Error(
                payload && payload.error && payload.error.message
                  ? payload.error.message
                  : "Installed games could not be checked.",
              ));
            };
            worker.postMessage(message, [channel.port2]);
          });
        }

        async function currentWorker() {
          if (!("serviceWorker" in navigator)) {
            throw new Error("This browser does not support offline games.");
          }
          if (navigator.serviceWorker.controller) {
            return navigator.serviceWorker.controller;
          }
          const registration = await navigator.serviceWorker.ready;
          const worker = registration.active || registration.waiting || registration.installing;
          if (!worker) throw new Error("The offline worker is unavailable.");
          return worker;
        }

        function renderInstalled(installed) {
          if (!Array.isArray(installed) || installed.length === 0) {
            status.textContent = "No verified offline games are installed on this device.";
            return;
          }

          for (const item of installed) {
            if (
              !item ||
              typeof item.gameId !== "string" ||
              !/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(item.gameId)
            ) {
              continue;
            }
            const row = document.createElement("li");
            const link = document.createElement("a");
            const name = document.createElement("span");
            const version = document.createElement("span");
            link.className = "game";
            link.href = `/vector/${encodeURIComponent(item.gameId)}`;
            name.textContent = item.gameId
              .split("-")
              .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
              .join(" ");
            version.className = "version";
            version.textContent = typeof item.gameVersion === "string"
              ? `v${item.gameVersion}`
              : "Offline";
            link.append(name, version);
            row.append(link);
            games.append(row);
          }

          if (games.children.length === 0) {
            status.textContent = "No verified offline games are installed on this device.";
            return;
          }
          status.textContent = "Choose a locally installed game.";
          games.hidden = false;
        }

        void currentWorker()
          .then((worker) => workerRequest(worker, { type: "VECTOR_STATUS" }))
          .then(renderInstalled)
          .catch((error) => {
            status.dataset.error = "true";
            status.textContent = error instanceof Error
              ? error.message
              : "Installed games could not be checked.";
          });
      })();
    </script>
  </body>
</html>
