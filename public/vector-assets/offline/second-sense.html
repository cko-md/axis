<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Second Sense — Offline</title>
    <!--
      The Wave 15.3 visual layer previously lived here as a second, independently
      maintained copy of the in-game palette. It has been removed alongside the
      injected stylesheet in game.ts so the design can be rebuilt in one place.

      Load-bearing and NOT design — do not rename: the element ids
      #second-sense-offline-root and #second-sense-offline-mount are looked up by
      offline-bootstrap.ts, and [data-offline-status] / [data-offline-status-text]
      carry the truthful offline state (loading, error, unavailable, quota,
      conflict) that the status contract depends on.
    -->
  </head>
  <body>
    <div id="second-sense-offline-root" data-offline-status="loading">
      <div class="ss-offline-bar">
        <strong>Second Sense · Offline</strong>
        <span data-offline-status-text role="status" aria-live="polite">Opening the local save…</span>
        <a href="/vector">VECTOR library</a>
      </div>
      <div id="second-sense-offline-mount"></div>
    </div>
    <script type="module" src="/vector-assets/offline/second-sense.js"></script>
  </body>
</html>
