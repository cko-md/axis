<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Second Sense — Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html, body {
        margin: 0;
        min-height: 100vh;
        background: #0c0e13;
        color: #ece8df;
      }
      #second-sense-offline-root { display: flex; flex-direction: column; min-height: 100vh; }
      .ss-offline-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.6rem 1rem;
        border-bottom: 1px solid #2a2f3f;
        font-size: 0.85rem;
      }
      .ss-offline-bar a { color: #e0c388; }
      [data-offline-status-text] { color: #cfc9bd; }
      #second-sense-offline-root[data-offline-status="error"] [data-offline-status-text],
      #second-sense-offline-root[data-offline-status="unavailable"] [data-offline-status-text],
      #second-sense-offline-root[data-offline-status="quota"] [data-offline-status-text],
      #second-sense-offline-root[data-offline-status="conflict"] [data-offline-status-text] {
        color: #e7a69e;
      }
      #second-sense-offline-mount { flex: 1; min-height: 0; }
      @media (prefers-color-scheme: light) {
        html, body { background: #f2ede2; color: #25231f; }
        .ss-offline-bar { border-color: #d8d0be; }
      }
    </style>
  </head>
  <body>
    <div id="second-sense-offline-root" data-offline-status="loading">
      <div class="ss-offline-bar">
        <strong>Second Sense · Offline</strong>
        <span data-offline-status-text role="status" aria-live="polite">Opening the local save…</span>
        <a href="/vector">VECTOR library</a>
      </div>
      <div id="second-sense-offline-mount"></div>
    </div>
    <script type="module" src="/vector-assets/offline/second-sense.js"></script>
  </body>
</html>
