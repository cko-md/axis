name: Unsigned Desktop Preview

on:
  push:
    tags:
      - "desktop-preview-v*"

permissions:
  contents: write

concurrency:
  group: desktop-preview-${{ github.ref }}
  cancel-in-progress: false

env:
  AXIS_DESKTOP_PRODUCTION_URL: "https://axis-cko.vercel.app"
  AXIS_DESKTOP_SENTRY_DSN: ${{ secrets.AXIS_DESKTOP_SENTRY_DSN }}
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Validate unsigned preview isolation
        run: npm run desktop:check && npm run desktop:check:current && npm run desktop:preview:validate
      - name: Audit desktop runtime dependencies
        run: npm audit --prefix electron --audit-level=high

  mac:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Build unsigned macOS preview
        run: npm run desktop:dist -- --mac --x64 --arm64 --publish never
      - name: Prove preview is unsigned and enforce size budgets
        run: |
          find dist-electron -type d -name "AXIS.app" -print0 | while IFS= read -r -d '' app_path; do
            if codesign --verify --deep --strict "$app_path" >/dev/null 2>&1; then
              echo "Unexpected signed app: $app_path"
              exit 1
            fi
          done
          npm run desktop:size:check
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-preview-mac
          if-no-files-found: error
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Build unsigned Windows preview
        run: npm run desktop:dist -- --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-preview-windows
          if-no-files-found: error
          path: dist-electron/*.exe

  linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Build Linux preview
        run: npm run desktop:dist -- --linux --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-preview-linux
          if-no-files-found: error
          path: dist-electron/*.AppImage

  publish:
    needs: [mac, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-preview-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish clearly labeled unsigned prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "AXIS Desktop Preview ${GITHUB_REF_NAME#desktop-preview-v} (Unsigned)" \
            --notes-file - \
            --prerelease \
            --verify-tag <<'EOF'
          ## Unsigned evaluation build

          This preview is intentionally **not code signed or notarized**.

          - macOS Gatekeeper will warn or block normal launch.
          - Windows SmartScreen may show an unknown-publisher warning.
          - macOS auto-update is disabled until the signed `desktop-v*` production wave.
          - No `latest*.yml` or differential-update metadata is published with this preview.
          - Use only for controlled evaluation; do not distribute as a production release.

          Apple Developer ID signing, notarization, stapling, and the signed update
          channel remain in the deferred production wave.
          EOF
