name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_7ZQfUWSX9EW1RmM7dJLr0Xd5
          VERCEL_PROJECT_ID: prj_AsZod1PVyNsQWySX6uEpw75t4QYD
