name: Release governance

# Security boundary: pull_request_target runs this workflow from the protected
# base revision. It checks out the candidate only as inert data and never runs
# candidate code, actions, dependencies, scripts, or package commands.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  release-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out immutable trusted base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false
          fetch-depth: 1

      - name: Set up trusted Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install trusted validator dependencies
        run: npm ci --ignore-scripts
        working-directory: trusted

      - name: Check out immutable candidate as data
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false
          fetch-depth: 1

      - name: Validate candidate with trusted base code
        run: node trusted/scripts/validate-release-candidate.mjs --base=trusted --candidate=candidate
