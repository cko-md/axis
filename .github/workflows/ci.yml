name: CI

# Pull-request quality gate (program §20). Runs the same checks AGENTS.md treats
# as the minimum bar for every PR — lint, typecheck, unit tests, and a
# production build — so a red gate blocks merge instead of relying on the
# once-a-day health check.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        # Build validates the whole app compiles and reports route bundle sizes
        # (perf budgets, §11). Supabase public env is required at module load;
        # placeholders are safe here because no network call runs at build time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build
