name: CI

# Pull-request quality gate (program §20). Runs the same checks AGENTS.md treats
# as the minimum bar for every PR — lint, typecheck, unit tests, and a
# production build — so a red gate blocks merge instead of relying on the
# once-a-day health check.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Checkpoint docs drifted badly enough that a resuming agent was directed to
  # redo five merged waves. This job fails the build when any checkpoint
  # document contradicts what git actually shows, so that cannot recur silently.
  docs-currency:
    runs-on: ubuntu-latest
    steps:
      # Full history: wave/PR state is derived from commit subjects on main, so
      # a shallow clone would make the derivation wrong rather than merely slow.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkpoint documentation matches the repository
        run: npm run state:check

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Release safety manifest
        run: npm run release:validate

      - name: Unit tests
        run: npm run test

      - name: Build
        # Build validates the whole app compiles and reports route bundle sizes
        # (perf budgets, §11). Supabase public env is required at module load;
        # placeholders are safe here because no network call runs at build time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        # Preserve next-build's exit status through tee; otherwise a failed
        # prerender can appear green until a later log parser happens to fail.
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Bundle budget
        # Deterministic perf gate (§11): fails on a total static-JS regression
        # past the budget in PERFORMANCE_BUDGETS.json.
        run: node scripts/check-bundle-budget.mjs

      - name: Enforce route performance budgets
        # Complementary per-route gate (§11, wave 11.2): fails when any route's
        # first-load JS exceeds PERFORMANCE_BUDGETS.json.
        run: node scripts/check-perf-budgets.mjs build.log

  e2e-smoke:
    # Public (unauthenticated) browser smoke — boots the app with placeholder
    # Supabase env and checks the login page renders. Fuller authenticated
    # flows need the local Supabase stack and run outside CI for now.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Public smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npx playwright test --project=public tests/e2e/ci-smoke.spec.ts

  e2e-authenticated:
    # Secret-free authenticated browser gate. A fresh local Supabase instance
    # applies the complete migration history, then an ephemeral confirmed user
    # exercises every authenticated Playwright spec against a production build.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          # Pin the local database/runtime contract for reproducible migrations.
          version: 2.109.1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase and apply migrations
        # Browser coverage needs Auth, Postgres, PostgREST, Storage, Realtime,
        # and the API gateway. Exclude development-only services to keep the
        # clean runner boot bounded without weakening the app-facing stack.
        run: supabase start -x studio,postgres-meta,imgproxy,mailpit,edge-runtime,vector

      - name: Derive local Data API grants from RLS policies
        run: docker exec -i supabase_db_axis psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < scripts/sql/bootstrap-local-e2e-role-grants.sql

      - name: Verify final lifecycle privilege contract
        run: docker exec -i supabase_db_axis psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < scripts/sql/verify-20260716-contract.sql

      - name: Prepare authenticated E2E environment
        run: node scripts/bootstrap-authenticated-e2e.mjs "$GITHUB_ENV"

      - name: Build against local Supabase
        run: npm run build

      - name: Authenticated browser suite
        env:
          E2E_WEB_SERVER_COMMAND: npm run start -- --hostname 127.0.0.1 --port 3000
        run: npx playwright test --project=authenticated

      - name: Tear down local Supabase
        if: always()
        run: supabase stop --no-backup
        continue-on-error: true
