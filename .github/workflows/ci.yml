name: CI

# Pull-request quality gate (program §20). Runs the same checks AGENTS.md treats
# as the minimum bar for every PR — lint, typecheck, unit tests, and a
# production build — so a red gate blocks merge instead of relying on the
# once-a-day health check.
on:
  pull_request:
  push:
    branches: [main]

# Every job starts from a read-only token. Artifact upload uses the dedicated
# Actions runtime token; no CI step needs repository write authority.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Checkpoint docs drifted badly enough that a resuming agent was directed to
  # redo five merged waves. This job fails the build when any checkpoint
  # document contradicts what git actually shows, so that cannot recur silently.
  docs-currency:
    runs-on: ubuntu-latest
    steps:
      # Full history: wave/PR state is derived from commit subjects on main, so
      # a shallow clone would make the derivation wrong rather than merely slow.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Checkpoint documentation matches the repository
        run: npm run state:check

  runtime-dependency-audit:
    # This is a release-blocking production dependency gate. It intentionally
    # excludes development tooling so its verdict and SBOM describe what can
    # reach the deployed application.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate runtime CycloneDX SBOM
        run: >-
          npm exec --offline -- cyclonedx-npm --package-lock-only --omit dev
          --output-reproducible --validate --output-file sbom.cdx.json

      - name: Upload runtime SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: runtime-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Audit production dependency tree
        run: npm audit --omit=dev --audit-level=high

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # release:validate compares the proposed migration ledger with the
          # protected merge base and must fail closed rather than trust a
          # depth-one synthetic PR merge checkout.
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Release safety manifest
        run: npm run release:validate

      - name: Unit tests
        run: npm run test

      - name: Build
        # Build validates the whole app compiles and reports route bundle sizes
        # (perf budgets, §11). Supabase public env is required at module load;
        # placeholders are safe here because no network call runs at build time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        # Preserve next-build's exit status through tee; otherwise a failed
        # prerender can appear green until a later log parser happens to fail.
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Bundle budget
        # Deterministic perf gate (§11): fails on a total static-JS regression
        # past the budget in PERFORMANCE_BUDGETS.json.
        run: node scripts/check-bundle-budget.mjs

      - name: Enforce route performance budgets
        # Complementary per-route gate (§11, wave 11.2): fails when any route's
        # first-load JS exceeds PERFORMANCE_BUDGETS.json.
        run: node scripts/check-perf-budgets.mjs build.log

  e2e-smoke:
    # Full public (unauthenticated) browser gate. Authenticated workflows run
    # separately against the isolated local Supabase stack below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build public test server
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build
      - name: Public browser suite
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          E2E_WEB_SERVER_COMMAND: npm run start -- --hostname 127.0.0.1 --port 3000
        # A required browser gate must cover every public spec, and a retry is
        # evidence of nondeterminism rather than a passing result.
        run: npx playwright test --project=public --fail-on-flaky-tests

  e2e-authenticated:
    # Secret-free authenticated browser gate. A fresh local Supabase instance
    # applies the complete migration history, then an ephemeral confirmed user
    # exercises every authenticated Playwright spec against a production build.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          # Pin the local database/runtime contract for reproducible migrations.
          version: 2.109.1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase and apply migrations
        # Browser coverage needs Auth, Postgres, PostgREST, Storage, Realtime,
        # and the API gateway. Exclude development-only services to keep the
        # clean runner boot bounded without weakening the app-facing stack.
        run: supabase start -x studio,postgres-meta,imgproxy,mailpit,edge-runtime,vector

      - name: Derive local Data API grants from RLS policies
        run: docker exec -i supabase_db_axis psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < scripts/sql/bootstrap-local-e2e-role-grants.sql

      - name: Verify final lifecycle privilege contract
        run: docker exec -i supabase_db_axis psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < scripts/sql/verify-20260716-contract.sql

      - name: Verify credential column privilege contract
        run: docker exec -i supabase_db_axis psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f - < scripts/sql/verify-20260723-credential-contract.sql

      - name: Prepare authenticated E2E environment
        run: node scripts/bootstrap-authenticated-e2e.mjs "$GITHUB_ENV"

      - name: Build against local Supabase
        run: npm run build

      - name: Authenticated browser suite
        env:
          E2E_WEB_SERVER_COMMAND: npm run start -- --hostname 127.0.0.1 --port 3000
        # Keep retry diagnostics, but fail the required gate whenever one was
        # needed. A green retry must not hide a flaky production workflow.
        run: npx playwright test --project=authenticated --fail-on-flaky-tests

      - name: Tear down local Supabase
        if: always()
        run: supabase stop --no-backup
        continue-on-error: true
