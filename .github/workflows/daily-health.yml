name: Daily Health Check
on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        id: tsc
        run: |
          set -o pipefail
          exit_code=0
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt || exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"
        continue-on-error: true

      - name: npm audit
        id: audit
        run: |
          set -o pipefail
          exit_code=0
          npm audit --audit-level=high 2>&1 | tee /tmp/audit-output.txt || exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"
        continue-on-error: true

      - name: Trigger Vercel cron health check
        id: vercron
        run: |
          touch /tmp/cron-output.txt
          curl_exit=0
          STATUS=$(curl --silent --show-error --max-time 60 \
            -o /tmp/cron-output.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://axis-cko.vercel.app/api/cron/daily") || curl_exit=$?
          if [ "$curl_exit" -ne 0 ]; then
            STATUS=000
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          cat /tmp/cron-output.txt
          if [ "$STATUS" != "200" ]; then
            exit 1
          fi
        continue-on-error: true

      - name: Post failure issue
        if: steps.tsc.outputs.exit_code != '0' || steps.audit.outputs.exit_code != '0' || steps.vercron.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tscOut = fs.existsSync('/tmp/tsc-output.txt') ? fs.readFileSync('/tmp/tsc-output.txt', 'utf8').slice(0, 2000) : 'N/A';
            const auditOut = fs.existsSync('/tmp/audit-output.txt') ? fs.readFileSync('/tmp/audit-output.txt', 'utf8').slice(0, 2000) : 'N/A';
            const cronOut = fs.existsSync('/tmp/cron-output.txt') ? fs.readFileSync('/tmp/cron-output.txt', 'utf8').slice(0, 1000) : 'N/A';

            const tscStatus = '${{ steps.tsc.outputs.exit_code }}' === '0' ? '✅ Pass' : '❌ Fail';
            const auditStatus = '${{ steps.audit.outputs.exit_code }}' === '0' ? '✅ Pass' : '❌ Fail';
            const cronStatus = '${{ steps.vercron.outputs.status }}';

            const body = [
              `## Daily Health Check Failed — ${new Date().toISOString().slice(0,10)}`,
              '',
              `**TypeScript**: ${tscStatus}`,
              `**npm audit**: ${auditStatus}`,
              `**Vercel cron**: HTTP ${cronStatus}`,
              '',
              '### TypeScript errors',
              '```',
              tscOut,
              '```',
              '',
              '### npm audit',
              '```',
              auditOut,
              '```',
              '',
              '### Cron response',
              '```json',
              cronOut,
              '```',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Health Check Failed — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['automated', 'health-check'],
            });

  dependency-audit:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Weekly dependency audit
        run: npm audit --audit-level=moderate
