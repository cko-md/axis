name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  AXIS_DESKTOP_RELEASE: "1"
  AXIS_DESKTOP_PRODUCTION_URL: "https://axis-cko.vercel.app"
  AXIS_DESKTOP_SENTRY_DSN: ${{ secrets.AXIS_DESKTOP_SENTRY_DSN || secrets.NEXT_PUBLIC_SENTRY_DSN }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install root dependencies
        run: npm ci
      - name: Install desktop runtime dependencies
        run: npm ci --prefix electron
      - name: Validate version, security, and current Electron stable
        run: npm run desktop:check && npm run desktop:check:current && node scripts/validate-desktop-release.mjs
      - name: Audit desktop runtime dependencies
        run: npm audit --prefix electron --audit-level=high

  mac:
    needs: verify
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY_CONTENT"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple macOS artifacts
        run: npm run desktop:release -- --mac --x64 --arm64 --publish never
      - name: Verify Developer ID signature and notarization ticket
        run: |
          find dist-electron -type d -name "AXIS.app" -print0 | while IFS= read -r -d '' app_path; do
            codesign --verify --deep --strict --verbose=2 "$app_path"
            xcrun stapler validate "$app_path"
            spctl --assess --verbose --type exec "$app_path"
          done
      - name: Enforce desktop size budgets
        run: npm run desktop:size:check
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          if-no-files-found: error
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Build Windows installer
        run: npm run desktop:release -- --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml

  linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm ci --prefix electron
      - name: Build Linux AppImage
        run: npm run desktop:release -- --linux --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            dist-electron/*.AppImage
            dist-electron/*.blockmap
            dist-electron/latest-linux.yml

  publish:
    needs: [mac, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts
          merge-multiple: true
      - name: Publish production desktop release and auto-update metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --repo "$GITHUB_REPOSITORY" --title "AXIS Desktop ${GITHUB_REF_NAME#desktop-v}" --generate-notes --verify-tag
